services:
  oneclickdownload:
    build: .
    image: oneclickdownload:latest
    restart: unless-stopped
    env_file: .env
    volumes:
      - /tmp/oneclickdownload:/tmp/oneclickdownload
      - yt_dlp_cache:/root/.cache/yt-dlp
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.oneclickdownload-http.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.oneclickdownload-http.entrypoints=http"
      - "traefik.http.routers.oneclickdownload-http.middlewares=redirect-to-https@file"
      - "traefik.http.routers.oneclickdownload-https.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.oneclickdownload-https.entrypoints=https"
      - "traefik.http.routers.oneclickdownload-https.tls=true"
      - "traefik.http.routers.oneclickdownload-https.tls.certresolver=letsencrypt"
      - "traefik.http.services.oneclickdownload.loadbalancer.server.port=3000"

networks:
  proxy:
    external: true

volumes:
  yt_dlp_cache:
